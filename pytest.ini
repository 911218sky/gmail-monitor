[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function

# 輸出設定
addopts = 
    -v
    --strict-markers
    --tb=short

# 標記
markers =
    unit: 單元測試
    integration: 整合測試
    slow: 執行較慢的測試
    network: 需要網路連線的測試
    asyncio: 異步測試

# 忽略警告
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
